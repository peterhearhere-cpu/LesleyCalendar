<!DOCTYPE html>
<html>
<head>
    <title>Lesley's Calendar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 10px; padding-bottom: 50px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; }
        button.nav { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #eee; border: none; border-radius: 5px; }
        h2 { margin: 0; color: #333; display: flex; align-items: center; font-size: 1.2em; }
        
        #status-icon { font-size: 18px; margin-left: 10px; }
        .online { color: #4CAF50; }
        .offline { color: #f44336; }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day-header { text-align: center; font-weight: bold; padding: 10px 0; color: #555; font-size: 0.8em; }
        .day-btn { height: 80px; background: white; border: 1px solid #ccc; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; position: relative; }
        .day-btn.weekend { background-color: #f9f9f9; color: #777; }
        .day-btn.has-event { background-color: #fff9c4; border: 2px solid #fbc02d; color: #d32f2f; }
        .day-btn.today { border: 2px solid #2196f3; }
        
        #popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: flex-start; z-index: 1000; padding-top: 30px; }
        .popup-content { background: white; padding: 20px; width: 92%; max-width: 500px; border-radius: 10px; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        
        .popup-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-top-save { background: #4CAF50; color: white; border: none; padding: 10px 25px; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-top-close { background: #f44336; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* Larger Text Box & Font */
        textarea { 
            width: 100%; 
            height: 220px; /* Increased height */
            font-size: 20px; /* Increased font size (20%+) */
            padding: 15px; 
            margin: 10px 0; 
            border: 2px solid #ccc; 
            box-sizing: border-box; 
            border-radius: 8px; 
            line-height: 1.4;
        }
        
        .security-footer { text-align: center; margin-top: 30px; padding: 15px; color: #666; font-size: 0.9em; font-style: italic; border-top: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="header">
    <button class="nav" onclick="move(-1)">&#10094; Prev</button>
    <h2 id="monthTitle">Syncing... <span id="status-icon" class="offline">❌</span></h2>
    <button class="nav" onclick="move(1)">Next &#10095;</button>
</div>

<div class="grid">
    <div class="day-header">MON</div><div class="day-header">TUE</div><div class="day-header">WED</div><div class="day-header">THU</div><div class="day-header">FRI</div><div class="day-header">SAT</div><div class="day-header">SUN</div>
</div>

<div id="calendarGrid" class="grid"></div>

<div class="security-footer">
    ⚠️ Reminder: Please do not store passwords, bank details, or sensitive info here.
</div>

<div id="popup">
    <div class="popup-content">
        <div class="popup-header">
            <h3 id="popupDate" style="margin:0; font-size: 1.3em;">Date</h3>
            <div>
                <button class="btn-top-save" onclick="saveEvent()">SAVE</button>
                <button class="btn-top-close" onclick="closePopup()">X</button>
            </div>
        </div>
        <textarea id="eventText" placeholder="Tap here to type..."></textarea>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAEJfSyTNlcm3uKoC8nqKBzkBjfzmNq-0s",
        authDomain: "lesleycalendar-59702.firebaseapp.com",
        databaseURL: "https://lesleycalendar-59702-default-rtdb.firebaseio.com",
        projectId: "lesleycalendar-59702",
        storageBucket: "lesleycalendar-59702.firebasestorage.app",
        messagingSenderId: "206794990386",
        appId: "1:206794990386:web:dcda160656a516cd7fad2b",
        measurementId: "G-9ZG3RJLNTC"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    var currentView = new Date();
    var selectedDateId = "";
    var allEvents = {};

    var connectedRef = db.ref(".info/connected");
    connectedRef.on("value", function(snap) {
      const icon = document.getElementById("status-icon");
      if (snap.val() === true) {
        icon.innerHTML = "✅";
        icon.className = "online";
      } else {
        icon.innerHTML = "❌";
        icon.className = "offline";
      }
    });

    db.ref("events").on("value", function(snapshot) {
        allEvents = snapshot.val() || {};
        drawCalendar();
    });

    function move(n) {
        currentView.setMonth(currentView.getMonth() + n);
        drawCalendar();
    }

    function drawCalendar() {
        var year = currentView.getFullYear();
        var month = currentView.getMonth();
        var monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        
        document.getElementById("monthTitle").innerHTML = monthNames[month] + " " + year + ' <span id="status-icon" class="' + document.getElementById("status-icon").className + '">' + document.getElementById("status-icon").innerHTML + '</span>';

        var firstDay = new Date(year, month, 1).getDay();
        var offset = (firstDay === 0) ? 6 : firstDay - 1; 
        var daysInMonth = new Date(year, month + 1, 0).getDate();
        
        var gridHtml = "";
        for (var i = 0; i < offset; i++) {
            gridHtml += "<div class='day-btn' style='visibility:hidden'></div>";
        }

        for (var day = 1; day <= daysInMonth; day++) {
            var dateId = year + "-" + (month + 1) + "-" + day;
            var dayOfWeek = new Date(year, month, day).getDay();
            var classes = "day-btn";
            if (dayOfWeek === 0 || dayOfWeek === 6) { classes += " weekend"; }
            if (allEvents[dateId] && allEvents[dateId].trim() !== "") { classes += " has-event"; }
            var today = new Date();
            if (day === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
                classes += " today";
            }
            gridHtml += "<button class='" + classes + "' onclick='openPopup(\"" + dateId + "\", " + day + ")'>" + day + "</button>";
        }
        document.getElementById("calendarGrid").innerHTML = gridHtml;
    }

    function openPopup(id, dayNum) {
        selectedDateId = id;
        var monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        var monthName = monthNames[currentView.getMonth()];
        document.getElementById("popupDate").innerText = dayNum + " " + monthName;
        document.getElementById("eventText").value = allEvents[id] || "";
        document.getElementById("popup").style.display = "flex";
        
        // Auto-focus on text area so keyboard pops up
        setTimeout(function() {
            document.getElementById("eventText").focus();
        }, 300);
    }

    function saveEvent() {
        var text = document.getElementById("eventText").value;
        db.ref("events/" + selectedDateId).set(text);
        closePopup();
    }

    function closePopup() {
        document.getElementById("popup").style.display = "none";
    }
</script>
</body>
</html>
